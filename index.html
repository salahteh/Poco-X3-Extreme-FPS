<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poco X3 120 FPS - SALAH .DZ</title>
    
    <style>
        /* التوسيط المطلق */
        html, body {
            height: 100%; /* تأكيد طول الصفحة الكامل */
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center; /* توسيط عمودي */
            justify-content: center; /* توسيط أفقي */
            background-color: #050505;
            font-family: sans-serif;
            overflow: hidden;
        }

        .container { 
            width: 85%;
            max-width: 360px; 
            background: #111; 
            padding: 35px 20px; 
            border-radius: 25px; 
            border: 1px solid #ff0055; 
            box-shadow: 0 0 30px rgba(255,0,85,0.3);
            text-align: center;
        }
        
        h2 { color: #ff0055; margin: 0 0 10px 0; font-size: 26px; text-shadow: 0 0 10px rgba(255,0,85,0.5); }
        .fps-badge { background: #ff0055; color: white; padding: 4px 12px; border-radius: 50px; font-size: 13px; font-weight: bold; }

        p { font-size: 14px; color: #ccc; margin-bottom: 25px; line-height: 1.6; }

        #btn {
            background: #ff0055;
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: block;
            box-shadow: 0 4px 20px rgba(255,0,85,0.4);
            animation: pulse 2s infinite; /* إضافة تأثير نبض خفيف */
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,0,85,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255,0,85,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,85,0); }
        }

        #btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; border: 1px solid #333; animation: none; }
        
        #status { margin-top: 25px; color: #ff0055; font-size: 13px; font-weight: bold; opacity: 0.9; }
        #timer-container { font-size: 16px; margin-bottom: 15px; color: #aaa; }
        #timer { font-weight: bold; color: #ff4757; font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SALAH .DZ <span class="fps-badge">120 FPS</span></h2>
    
    <p>تفعيل سلاسة 120 FPS القصوى لجهاز Poco X3 Pro<br>إصدار الحماية الأخير 2026</p>

    <div id="timer-container">انتظر فحص النظام: <span id="timer">15</span>ث</div>

    <button id="btn" disabled>جاري التحقق...</button>
    
    <div id="status">جاري فحص معدل التحديث (120Hz)...</div>
</div>

<script>
    window.onload = function() {
        let sec = 15;
        const btn = document.getElementById('btn');
        const timer = document.getElementById('timer');
        const timerContainer = document.getElementById('timer-container');
        const status = document.getElementById('status');

        const adLink = "https://equatoriallip.com/WE984B";
        const mediaLink = "https://www.mediafire.com/file/YOUR_120FPS_FILE"; 

        const counter = setInterval(() => {
            sec--;
            if(timer) timer.innerText = sec;
            
            if (sec === 12) status.innerText = "تحسين استقرار الـ Kernel...";
            if (sec === 8) status.innerText = "ضبط إعدادات GPU Adreno...";
            if (sec === 4) status.innerText = "تجهيز رابط التحميل الآمن...";

            if (sec <= 0) {
                clearInterval(counter);
                timerContainer.innerHTML = "اكتمل الفحص بنجاح ✅";
                timerContainer.style.color = "#00ffa3";
                btn.innerText = "تحميل ملف 120 FPS الآن 🚀";
                btn.disabled = false;
                status.innerText = "الملف جاهز للحقن المباشر!";
            }
        }, 1000);

        btn.onclick = function() {
            window.open(adLink, '_blank');
            
            setTimeout(() => {
                status.innerText = "تم فتح الإعلان بنجاح!";
                btn.innerText = "اضغط هنا للانتقال للميديا فاير ✅";
                btn.style.background = "#00ffa3";
                btn.style.color = "#000";
                btn.style.animation = "none";
                btn.style.boxShadow = "0 4px 15px rgba(0,255,163,0.3)";
                
                btn.onclick = function() {
                    window.location.href = mediaLink;
                };
            }, 500);
        };
    };
</script>

</body>
</html>
