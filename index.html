<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALAH .DZ | تحسين أداء POCO X3 Pro</title>
    <style>
        :root {
            --evox-blue: #7baaf7;
            --dark-bg: #0b0e14;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--evox-blue);
            width: 90%;
            max-width: 400px;
        }
        h2 { color: var(--evox-blue); margin-bottom: 10px; }
        p { color: #8b949e; font-size: 14px; }
        .timer-text { font-weight: bold; color: #ffcc00; margin: 15px 0; display: none; }
        .btn {
            background-color: var(--evox-blue);
            color: #0b0e14;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            text-decoration: none;
            display: block;
        }
        .btn-download {
            background-color: #2ea44f;
            color: white;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>SALAH .DZ</h2>
    <p>تجهيز ملف تحسين الأداء و FPS...</p>
    
    <button id="mainBtn" class="btn" onclick="startProcess()">فتح رابط التحميل</button>
    
    <div id="timerArea" class="timer-text">يرجى الانتظار <span id="seconds">10</span> ثانية...</div>
    
    <a id="downloadBtn" href="رابط_ميديا_فاير_هنا" class="btn btn-download">تحميل الملف الآن 📥</a>
</div>

<script>
    // ضع رابط HilltopAds الخاص بك هنا
    const AD_LINK = "https://equatoriallip.com/WE984B";

    function startProcess() {
        // 1. فتح الإعلان في نافذة جديدة
        window.open(AD_LINK, '_blank');

        // 2. إخفاء الزر الأول وإظهار العداد
        document.getElementById('mainBtn').style.display = 'none';
        const timerArea = document.getElementById('timerArea');
        timerArea.style.display = 'block';

        // 3. بدء العد التنازلي
        let timeLeft = 10;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerArea.style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'block';
            }
        }, 1000);
    }
</script>

</body>
</html>
