<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل ملف 120 FPS</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ad-slot {
            width: 100%;
            min-height: 100px;
            background: #161b22;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed #30363d;
        }

        .main-card {
            max-width: 500px;
            width: 100%;
            background: #1c2128;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #timer-box {
            font-size: 18px;
            margin: 20px 0;
            color: #adbac7;
        }

        #seconds {
            font-size: 30px;
            font-weight: bold;
            color: #2ea043;
            display: block;
        }

        .download-btn {
            display: none; /* مخفي حتى ينتهي العداد */
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .download-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="ad-slot">
        <script>
        (function(oske){
        var d = document, s = d.createElement('script'), l = d.scripts[d.scripts.length - 1];
        s.settings = oske || {};
        s.src = "\/\/stale-father.com\/b.X\/VSsSdBGklf0\/YwW\/cR\/OexmM9duPZnU\/lFkUPmTWYp5BM\/D\/IXx\/OjDeU_tKNNjpkiwPMajIEc4\/OPQA";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
        })({})
        </script>
    </div>

    <div class="main-card">
        <h2>جاهز لتحميل ملف 120 FPS؟ 🎮</h2>
        <p>يتم الآن فحص وتجهيز رابط ميديا فاير الخاص بك...</p>

        <div id="timer-box">
            يرجى الانتظار ثواني قليلة:
            <span id="seconds">15</span>
        </div>

        <button id="btn-action" class="download-btn">تحميل الآن (MediaFire)</button>
    </div>

    <div class="ad-slot">
        <script>
        (function(oske){
        var d = document, s = d.createElement('script'), l = d.scripts[d.scripts.length - 1];
        s.settings = oske || {};
        s.src = "\/\/stale-father.com\/b.X\/VSsSdBGklf0\/YwW\/cR\/OexmM9duPZnU\/lFkUPmTWYp5BM\/D\/IXx\/OjDeU_tKNNjpkiwPMajIEc4\/OPQA";
        s.async = true;
        s.referrerPolicy = 'no-referrer-when-downgrade';
        l.parentNode.insertBefore(s, l);
        })({})
        </script>
    </div>

    <script>
        // 1. الإعدادات
        let timeLeft = 15;
        const directAdLink = "https://equatoriallip.com/WE984B"; // رابط Adsterra المباشر
        const mediafireLink = "https://www.mediafire.com/"; // رابط ملف ميديا فاير

        const secondsDisplay = document.getElementById('seconds');
        const timerBox = document.getElementById('timer-box');
        const actionBtn = document.getElementById('btn-action');

        // 2. وظيفة العداد التنازلي
        const countdown = setInterval(() => {
            timeLeft--;
            secondsDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerBox.style.display = 'none';
                actionBtn.style.display = 'inline-block';
            }
        }, 1000);

        // 3. وظيفة الزر (فتح الإعلان وتحويل الصفحة لميديا فاير)
        actionBtn.onclick = function() {
            // فتح رابط الإعلان في نافذة جديدة
            window.open(directAdLink, '_blank');
            
            // تحويل الصفحة الحالية إلى ميديا فاير بعد 1 ثانية
            setTimeout(() => {
                window.location.href = mediafireLink;
            }, 1000);
        };
    </script>

</body>
</html>
