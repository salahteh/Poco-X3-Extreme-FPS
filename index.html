    <style>
        /* تنسيق الصفحة لتناسب شاشات الجوال مثل Poco X3 Pro */
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            text-align: center;
        }

        /* حاوية البانرات */
        .ad-section {
            width: 100%;
            min-height: 100px;
            background: #161b22;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
        }

        .bottom-ad {
            border-bottom: none;
            border-top: 1px solid #30363d;
        }

        /* منطقة المحتوى والعداد في المنتصف */
        .content-middle {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #1c2128;
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 450px;
        }

        #timer-title { font-size: 16px; color: #8b949e; margin-bottom: 15px; }
        
        #countdown {
            font-size: 50px;
            font-weight: bold;
            color: #58a6ff;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.3);
        }

        /* زر التحميل الاحترافي */
        .download-btn {
            display: none; /* مخفي حتى ينتهي العداد */
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .download-btn:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #2ea043, #3fb950);
        }
    </style>
</head>
