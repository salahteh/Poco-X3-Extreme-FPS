<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل 120 FPS</title>

    <script>
       /* هنا تلصق الكود البرمجي الطويل الخاص بـ HilltopAds */
    </script>
    <style>
        /* تنسيقات الصفحة (CSS) */
        body { background-color: #0d1117; color: white; text-align: center; font-family: sans-serif; }
        .container { max-width: 400px; margin: 100px auto; padding: 20px; background: #1c2128; border-radius: 10px; }
        #downloadBtn { display: none; background: #238636; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>رابط ميديا فاير جاهز</h2>
        <div id="timer">انتظر <span id="count">15</span> ثانية...</div>
        <button id="downloadBtn">تحميل الآن</button>
    </div>

    <script>
        // كود العداد التنازلي والتحويل المزدوج
        let timeLeft = 15;
        const directLink = "https://equatoriallip.com/WE984B"; // رابطك المباشر
        const mediafire = "https://www.mediafire.com"; // رابط ميديا فاير

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('count').textContent = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timer').style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'inline-block';
            }
        }, 1000);

        document.getElementById('downloadBtn').onclick = function() {
            window.open(directLink, '_blank');
            setTimeout(() => { window.location.href = mediafire; }, 800);
        };
    </script>
</body>
</html>
