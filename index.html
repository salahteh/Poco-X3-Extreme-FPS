<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poco X3 90 FPS - SALAH .DZ</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #00ffa3; }
        img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        button { background: #00ffa3; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        button:disabled { background: #333; color: #777; cursor: not-allowed; }
        #status { margin-top: 15px; color: #00ffa3; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#00ffa3;">SALAH .DZ</h2>
    <img src="https://f.top4top.io/p_3736whw5q0.png" alt="90 FPS Proof">
    
    <p>تجهيز ملف 90 FPS لجهاز Poco X3 Pro...</p>

    <button id="btn" disabled>انتظر (<span id="timer">15</span>) ثانية</button>
    <div id="status">جاري الفحص...</div>
</div>

<script>
    let sec = 15;
    const btn = document.getElementById('btn');
    const timer = document.getElementById('timer');
    const status = document.getElementById('status');

    // الروابط الخاصة بك
    const adLink = "https://equatoriallip.com/WE984B";
    const mediaLink = "https://www.mediafire.com/file/YOUR_FILE_LINK"; // استبدل هذا برابطك

    const counter = setInterval(() => {
        sec--;
        timer.innerText = sec;
        if (sec <= 0) {
            clearInterval(counter);
            btn.innerText = "تحميل الملف الآن 📥";
            btn.disabled = false;
            status.innerText = "جاهز للتحميل!";
        }
    }, 1000);

    btn.onclick = () => {
        window.open(adLink, '_blank'); // يفتح الإعلان
        btn.innerText = "اضغط هنا للميديا فاير ✅";
        btn.style.background = "#ff9800";
        btn.onclick = () => { window.location.href = mediaLink; }; // يفتح ميديا فاير
    };
</script>

</body>
</html>
