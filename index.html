<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفعيل 120 FPS</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #161b22;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .ad-box {
            margin: 20px 0;
            min-height: 100px;
            border: 1px dashed #444;
            padding: 10px;
            background: #0d1117;
        }

        #wait-area {
            margin: 20px 0;
            padding: 15px;
        }

        #timer-num {
            font-size: 35px;
            font-weight: bold;
            color: #58a6ff;
            display: block;
            margin-top: 10px;
        }

        /* زر الرابط المباشر - مخفي افتراضياً */
        .btn-link {
            display: none;
            background-color: #238636;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-link:hover {
            background-color: #2ea043;
        }

        .msg-text {
            font-size: 14px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #58a6ff;">أداة تحسين الفريمات 🚀</h2>
        <p class="msg-text">جاري فحص التوافق مع جهازك...</p>

        <div class="ad-box">
            <script>
            (function(oske){
            var d = document,
                s = d.createElement('script'),
                l = d.scripts[d.scripts.length - 1];
            s.settings = oske || {};
            s.src = "\/\/stale-father.com\/b.X\/VSsSdBGklf0\/YwW\/cR\/OexmM9duPZnU\/lFkUPmTWYp5BM\/D\/IXx\/OjDeU_tKNNjpkiwPMajIEc4\/OPQA";
            s.async = true;
            s.referrerPolicy = 'no-referrer-when-downgrade';
            l.parentNode.insertBefore(s, l);
            })({})
            </script>
        </div>

        <div id="wait-area">
            <p id="status-text">يرجى الانتظار لتجهيز رابط التحميل المباشر...</p>
            <span id="timer-num">15</span>
        </div>

        <a href="https://www.google.com" id="direct-link" class="btn-link" target="_blank">
            اضغط هنا للتحميل المباشر
        </a>
    </div>

    <script>
        let seconds = 15; // عدد الثواني
        const timerDisplay = document.getElementById('timer-num');
        const waitArea = document.getElementById('wait-area');
        const directBtn = document.getElementById('direct-link');
        const statusText = document.getElementById('status-text');

        // استبدل هذا الرابط برابطك المباشر من Adsterra
        const myDirectLink = "https://example.com/your-direct-link"; 

        const countdown = setInterval(() => {
            seconds--;
            timerDisplay.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(countdown);
                timerDisplay.style.display = 'none';
                statusText.textContent = "✅ الرابط جاهز الآن!";
                
                // تفعيل الزر وربطه بالرابط
                directBtn.href = myDirectLink;
                directBtn.style.display = 'inline-block';
            }
        }, 1000);
    </script>

</body>
</html>
