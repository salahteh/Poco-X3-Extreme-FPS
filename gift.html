<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استلام مكافأتك الرقمية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 90%;
            border: 1px solid #334155;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 15px;
            color: #fbbf24;
        }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        .timer {
            font-size: 13px;
            color: #ef4444;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">💰</div>
    <h1>تهانينا! أنت مؤهل للمكافأة</h1>
    <p>لقد تم اختيار محفظتك لاستلام حصة من العملات المشفرة المجانية (Airdrop).</p>
    
    <button class="btn" onclick="redirectToAd()">استلم مكافأتك الآن</button>
    
    <div class="timer">ينتهي العرض خلال: <span id="countdown">05:00</span></div>
</div>

<script>
    // ضع رابطك المباشر هنا
    const directLink = "https://elementarywhole.com/jyqVCz";

    function redirectToAd() {
        window.location.href = directLink;
    }

    // عداد تنازلي بسيط للتمويه وزيادة الحماس
    let time = 300;
    const timerElement = document.getElementById('countdown');
    setInterval(() => {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? '0' + seconds : seconds;
        timerElement.innerHTML = `0${minutes}:${seconds}`;
        if (time > 0) time--;
    }, 1000);
</script>

</body>
</html>
